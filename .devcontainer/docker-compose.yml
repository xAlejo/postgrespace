networks:
  pgnet:
    driver: bridge

services:

  workspace:
    image: mcr.microsoft.com/devcontainers/base:ubuntu
    command: sleep infinity
    networks:
      - pgnet

  postgres:
    image: postgres:16
    restart: unless-stopped
    command: ["postgres", "-c", "hba_file=/etc/postgresql/pg_hba.conf"]
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - ./initdb:/docker-entrypoint-initdb.d
      - ./pg_hba.conf:/etc/postgresql/pg_hba.conf
    networks:
      - pgnet

  pgadmin:
    image: dpage/pgadmin4:latest
    restart: unless-stopped
    user: root
    environment:
      PGADMIN_DEFAULT_EMAIL: postgres@sql.dev
      PGADMIN_DEFAULT_PASSWORD: 1234
      # Modo escritorio: pgAdmin no pide login, asi que no hay sesion ni cookie.
      # Esto elimina de raiz el bug del proxy HTTPS de Codespaces: al terminar
      # el SSL en el proxy, pgAdmin (que internamente ve HTTP) generaba la
      # cookie de login invalida y las XHR autenticadas (preferences/get_all,
      # misc/bgprocess, status...) devolvian 401 -> pagina en blanco. En un
      # laboratorio de un solo usuario local no hace falta el modo servidor.
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    ports:
      - "5050:80"
    volumes:
      # Pre-registra el servidor PostgreSQL: los alumnos no tienen que
      # registrarlo a mano, ya aparece bajo "Servers" al abrir pgAdmin.
      - ./pgadmin/servers.json:/pgadmin4/servers.json
      - ./pgadmin/pgpassfile:/pgpassfile
      # Montar data/ directamente sobre el subdirectorio del usuario de pgAdmin.
      # pgAdmin escribe los backups en /var/lib/pgadmin/storage/postgres_sql.dev/
      # y como ese path ya existe como mount point, no intenta crearlo ni hacerle chmod 700.
      # Resultado: los archivos quedan en data/ sin subcarpeta intermedia.
      - ../data:/var/lib/pgadmin/storage/postgres_sql.dev
    networks:
      - pgnet
