version: '3.8'

networks:
  pgnet:
    driver: bridge

services:

  workspace:
    image: mcr.microsoft.com/devcontainers/base:ubuntu
    command: sleep infinity
    networks:
      - pgnet

  postgres:
    image: postgres:16
    restart: unless-stopped
    command: ["postgres", "-c", "hba_file=/etc/postgresql/pg_hba.conf"]
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      # Persistencia del data directory (gitignored, NO se commitea).
      # La primera vez que está vacío, se ejecutan los scripts de initdb.
      - ../pgdta:/var/lib/postgresql/data
      # Scripts de inicialización automática (commiteados). Solo corren
      # cuando el data directory está vacío -> crean la DB de ejemplo.
      - ./initdb:/docker-entrypoint-initdb.d
      # pg_hba.conf personalizado: permite conexiones desde cualquier host
      # Docker sin depender del pg_hba.conf generado en pgdta.
      - ./pg_hba.conf:/etc/postgresql/pg_hba.conf
    networks:
      - pgnet

  pgadmin:
    image: dpage/pgadmin4:latest
    restart: unless-stopped
    user: root
    environment:
      PGADMIN_DEFAULT_EMAIL: postgres@sql.dev
      PGADMIN_DEFAULT_PASSWORD: 1234
    ports:
      - "5050:80"
    volumes:
      # Pre-registra el servidor PostgreSQL: los alumnos no tienen que
      # registrarlo a mano, ya aparece bajo "Servers" al abrir pgAdmin.
      - ./pgadmin/servers.json:/pgadmin4/servers.json
      - ./pgadmin/pgpassfile:/pgpassfile
      # Montar data/ directamente sobre el subdirectorio del usuario de pgAdmin.
      # pgAdmin escribe los backups en /var/lib/pgadmin/storage/postgres_sql.dev/
      # y como ese path ya existe como mount point, no intenta crearlo ni hacerle chmod 700.
      # Resultado: los archivos quedan en data/ sin subcarpeta intermedia.
      - ../data:/var/lib/pgadmin/storage/postgres_sql.dev
    networks:
      - pgnet